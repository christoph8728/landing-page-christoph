content:
  thesis_quote: |-
    Most "transformation" projects fail because they're led by
    people who've never run the thing they're transforming.
  thesis_supporting: |-
    A decade on the inside — restructuring operations, building
    systems, and shipping product in industries that don't move
    fast and don't forgive mistakes. Now I'm applying that
    experience to building <strong>infrastructure from scratch</strong>
    — a B2B marketplace for an industry that still runs on phone
    calls and PDF quotes.
  numbers:
    - value: <u>90</u>&nbsp;people
      label: Operations team led at ARRI Lighting through manufacturing restructuring and strategic outsourcing.
      context: 2022 – 2025 · Munich
    - value: <u>€25M+</u>
      label: Cost reduction programs delivered at Wacker Neuson — across construction equipment and e-mobility, reported to the executive board.
      context: 2019 – 2022 · Group level
    - value: <u>40+</u>&nbsp;papers
      label: Peer-reviewed publications across journals and conferences — engineering design, complexity, product-service systems.
      context: 2013 – 2019 · TUM
    - value: <u>1</u>&nbsp;company
      label: Co-founded and currently building — transactional B2B marketplace, zero to one, from Munich.
      context: 2025 – now · CloudStage
  speaking_topics:
    - title: The Turnaround Myth — why restructuring fails when you follow the playbook
      slug: turnaround-myth
      format: Keynote · 25 min
      audience: Operators & PE
      description: What actually happens when you restructure a manufacturing operation from the inside — not from a slide deck. Decision-making under ambiguity, organizational friction, and why most playbooks don't survive contact with reality.
    - title: The Analog Problem — why digital transformation isn't a technology project
      slug: analog-problem
      format: Keynote · 25 min
      audience: Industry · Tech
      description: Why "digital transformation" fails when it's treated as a technology project. Lessons from bringing transactional infrastructure to an industry that's been analog for decades.
    - title: The Engineer's Founder — why structure beats hustle in early-stage chaos
      slug: engineers-founder
      format: Keynote & Panel · Variable
      audience: Founders · VCs
      description: The founder's transition from operator to builder. Making irreversible decisions with incomplete information, and why a structured engineering mindset is an unfair advantage.
  cta:
    heading: Let's talk.
    heading_html: Let&rsquo;s <em>talk.</em>
    description: Available for select speaking engagements, advisory roles, and the occasional conversation that's actually interesting.
